name: github-repo-stats

on:
  schedule:
    # 매일 23:55 UTC (= 08:55 KST) 실행
    - cron: "55 23 * * *"
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-22.04
    strategy:
      # 동일 데이터 브랜치에 동시 push 충돌 방지
      max-parallel: 1
      fail-fast: false
      matrix:
        repository:
          - ing-gom/sts2-card-advisor
          - ing-gom/sts2-combat-ai
          - ing-gom/Sts2SkinManager
          - ing-gom/sts2-game-speed
          - ing-gom/sts2-undo-mod
          - ing-gom/claude-mod-skills
          - ing-gom/Sts2HostObserver
          - ing-gom/Sts2MultiplayerSync
          - ing-gom/Sts2SilkenTressBackport
          - ing-gom/sts2-potion-drop-chance
          - ing-gom/sts2-orb-layout
    name: ${{ matrix.repository }}
    steps:
      - uses: jgehrcke/github-repo-stats@RELEASE
        with:
          repository: ${{ matrix.repository }}
          ghtoken: ${{ secrets.GHRS_GITHUB_API_TOKEN }}
          databranch: github-repo-stats

  aggregate-index:
    needs: stats
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout master (for script)
        uses: actions/checkout@v4

      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: github-repo-stats
          path: data

      - name: Generate index.html
        working-directory: data
        env:
          GH_TOKEN: ${{ secrets.GHRS_GITHUB_API_TOKEN }}
        run: python ../scripts/generate_index.py

      - name: Commit and push
        working-directory: data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "no changes to index.html"
          else
            git commit -m "ci: regenerate aggregate index"
            git push
          fi
