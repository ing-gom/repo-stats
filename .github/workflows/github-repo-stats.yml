name: github-repo-stats

on:
  schedule:
    # 매일 23:55 UTC (= 08:55 KST) 실행
    - cron: "55 23 * * *"
  workflow_dispatch:

jobs:
  # ing-gom 의 public·비archived·비fork 레포를 매 실행마다 조회해 matrix 를 동적 생성.
  # 새 레포 공개 시 별도 편집 없이 다음 실행부터 자동 편입된다.
  discover:
    runs-on: ubuntu-22.04
    outputs:
      repos: ${{ steps.list.outputs.repos }}
    steps:
      - name: List public repos
        id: list
        env:
          GH_TOKEN: ${{ secrets.GHRS_GITHUB_API_TOKEN }}
        run: |
          repos=$(gh repo list ing-gom \
            --visibility public --no-archived --source -L 300 \
            --json nameWithOwner \
            --jq '[.[].nameWithOwner] | map(select(. != "ing-gom/repo-stats")) | sort')
          echo "discovered:"; echo "$repos"
          echo "repos=$(echo "$repos" | jq -c .)" >> "$GITHUB_OUTPUT"

  stats:
    needs: discover
    runs-on: ubuntu-22.04
    strategy:
      # 동일 데이터 브랜치에 동시 push 충돌 방지
      max-parallel: 1
      fail-fast: false
      matrix:
        repository: ${{ fromJSON(needs.discover.outputs.repos) }}
    name: ${{ matrix.repository }}
    steps:
      - uses: jgehrcke/github-repo-stats@RELEASE
        with:
          repository: ${{ matrix.repository }}
          ghtoken: ${{ secrets.GHRS_GITHUB_API_TOKEN }}
          databranch: github-repo-stats

  aggregate-index:
    needs: [discover, stats]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout master (for script)
        uses: actions/checkout@v4

      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: github-repo-stats
          path: data

      - name: Generate index.html
        working-directory: data
        env:
          GH_TOKEN: ${{ secrets.GHRS_GITHUB_API_TOKEN }}
          REPOS_JSON: ${{ needs.discover.outputs.repos }}
        run: python ../scripts/generate_index.py

      - name: Commit and push
        working-directory: data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "no changes to index.html"
          else
            git commit -m "ci: regenerate aggregate index"
            git push
          fi
